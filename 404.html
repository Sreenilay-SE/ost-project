<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Open Source Tech</title>
  <meta name="description" content="The page you were looking for could not be found. Return to the Open Source Tech community homepage." />
  <meta name="robots" content="noindex, follow" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=Outfit:wght@200;300;400;500&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="opensource tech logo.jpeg" type="image/jpeg" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#C9A96E" />

  <style>
    /* 404-specific layout — does not conflict with style.css */
    .error-page {
      min-height: 100vh;
      background-color: #F0F2F5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      font-family: 'DM Sans', sans-serif;
    }

    .error-code {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 300;
      line-height: 1;
      color: #C9A96E;
      letter-spacing: -0.04em;
      margin: 0;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
    }

    .error-page h1 {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 300;
      color: #1a1a1a;
      margin: 0.5rem 0 1rem;
      letter-spacing: 0.02em;
      opacity: 0;
      animation: fadeUp 0.8s 0.15s ease forwards;
    }

    .error-msg {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      color: #555;
      max-width: 380px;
      line-height: 1.7;
      margin: 0 auto 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.3s ease forwards;
    }

    .error-home-btn {
      display: inline-block;
      padding: 0.85rem 2.4rem;
      background: #C9A96E;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 2px;
      transition: background 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
      box-shadow: 0 4px 20px rgba(201, 169, 110, 0.3);
      opacity: 0;
      animation: fadeUp 0.8s 0.45s ease forwards;
    }

    .error-home-btn:hover {
      background: #b8924e;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(201, 169, 110, 0.45);
    }

    .error-divider {
      width: 48px;
      height: 1px;
      background: #C9A96E;
      margin: 0 auto 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.1s ease forwards;
    }

    .error-logo {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div class="error-page">
    <img src="opensource tech logo.jpeg" alt="Open Source Tech" class="error-logo" width="56" height="56" />
    <div class="error-code" aria-hidden="true">404</div>
    <div class="error-divider"></div>
    <h1>Page Not Found</h1>
    <p class="error-msg">
      The page you're looking for seems to have drifted into deep space.
      Let's get you back to the community.
    </p>
    <a href="index.html" class="error-home-btn" id="return-home-btn">Return Home</a>
  </div>
</body>

</html>
